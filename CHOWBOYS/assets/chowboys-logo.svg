<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">ChowBoys Logo</title>
  <desc id="desc">A cowboy-inspired horse mascot holding a bowl, representing Texan barbecue fused with Filipino silog meals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#132c47"/>
      <stop offset="1" stop-color="#3a2619"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <circle cx="128" cy="128" r="118" fill="url(#bg)" stroke="#f2c14e" stroke-width="8"/>

  <!-- Bowl -->
  <path d="M64 154c5 30 33 54 64 54s59-24 64-54H64z" fill="#f2c14e" opacity="0.95"/>
  <path d="M74 154c5 22 28 40 54 40s49-18 54-40H74z" fill="#ffffff" opacity="0.15"/>
  <path d="M64 154h128" stroke="#0c0b0a" stroke-width="8" stroke-linecap="round" opacity="0.55"/>

  <!-- Rice (simple dots) -->
  <g fill="#fff" opacity="0.9">
    <circle cx="96" cy="150" r="4"/><circle cx="114" cy="146" r="3.5"/><circle cx="132" cy="150" r="4"/>
    <circle cx="150" cy="146" r="3.5"/><circle cx="168" cy="150" r="4"/><circle cx="123" cy="158" r="3.5"/>
    <circle cx="143" cy="158" r="3.5"/>
  </g>

  <!-- Horse head + hat (stylized) -->
  <path d="M174 62c-20-14-56-10-78 10-18 17-24 44-12 66 4 7 10 14 18 20 10 8 22 12 35 12 16 0 30-6 41-16 10-10 17-24 18-40 1-20-8-39-22-52z"
        fill="#3a2619" stroke="#f2c14e" stroke-width="6" stroke-linejoin="round"/>
  <path d="M192 58c-15-9-30-14-46-14-7 0-14 1-21 3 5 3 10 7 15 12 0 0 0 0 0 0 12-2 26 0 39 8l13-9z"
        fill="#132c47" opacity="0.95"/>
  <path d="M112 68c10-16 30-28 54-28 10 0 19 2 28 6l-10 10c-6-2-12-3-18-3-16 0-30 6-40 15l-14 0z"
        fill="#f2c14e" opacity="0.95"/>

  <!-- Face details -->
  <circle cx="156" cy="98" r="5" fill="#0c0b0a"/>
  <path d="M137 117c10 10 24 12 39 6" stroke="#0c0b0a" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <path d="M120 110c-5 10-5 22 1 34" stroke="#f2c14e" stroke-width="6" stroke-linecap="round" opacity="0.65"/>

  <!-- Small scarf accent -->
  <path d="M120 148c12 6 25 9 39 6 3 8 3 14 0 20-16 4-33 1-49-7 2-7 5-13 10-19z" fill="#c7372f"/>
</svg>

